name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './科创服务/policy-tracker/backend/package-lock.json'

    - name: Install Backend Dependencies
      working-directory: ./科创服务/policy-tracker/backend
      run: npm ci

    - name: Run Backend Lint
      working-directory: ./科创服务/policy-tracker/backend
      run: npm run lint

    - name: Run Backend Tests
      working-directory: ./科创服务/policy-tracker/backend
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: postgres
        DB_PASSWORD: postgres
        DB_NAME: test_db
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        JWT_SECRET: test-secret
        NODE_ENV: test
      run: npm test

  frontend-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './科创服务/policy-tracker/frontend/package-lock.json'

    - name: Install Frontend Dependencies
      working-directory: ./科创服务/policy-tracker/frontend
      run: npm ci

    - name: Build Frontend
      working-directory: ./科创服务/policy-tracker/frontend
      run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      working-directory: ./科创服务/policy-tracker
      run: |
        docker build -t policy-tracker-backend:latest ./backend

    - name: Build Frontend Docker Image
      working-directory: ./科创服务/policy-tracker
      run: |
        docker build -t policy-tracker-frontend:latest ./frontend

    - name: Test Docker Compose
      working-directory: ./科创服务/policy-tracker
      run: |
        docker-compose config

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Production
      env:
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      run: |
        echo "Deploying to production..."
        # 这里可以添加实际的部署脚本
        # 例如使用 SSH 连接到服务器执行部署命令
